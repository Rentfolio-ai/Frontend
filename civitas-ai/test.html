<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    .dark {
      --background: 0 0% 13%;
      --foreground: 0 0% 90%;
    }
    
    body {
      margin: 0;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-center;
      min-height: 100vh;
    }
    
    .test-box {
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      text-align: center;
    }
    
    h1 {
      margin: 0 0 20px 0;
      font-size: 32px;
      font-weight: 600;
    }
    
    p {
      margin: 0;
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="test-box">
    <h1>✅ Dark Mode is Working!</h1>
    <p>If you can see this with a dark background, CSS is loading correctly.</p>
    <br>
    <p>Background should be dark gray (#212121)</p>
    <p>Text should be light gray (#E5E5E5)</p>
  </div>
  
  <script>
    console.log('Test page loaded!');
    console.log('HTML class:', document.documentElement.className);
    console.log('Body background:', window.getComputedStyle(document.body).backgroundColor);
  </script>
</body>
</html>
